<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stardew Valley Kalender-Editor</title>
  
  <!-- PWA Meta Tags & Manifest als Data-URI für maximale Autonomie -->
  <meta name="theme-color" content="#30160b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="shortcut icon" href="https://img.icons8.com/color/48/calendar--v1.png" type="image/png">
  <link rel="manifest" href='data:application/manifest+json,{"name":"Stardew Valley Kalender-Editor","short_name":"SV Kalender","start_url":".","display":"standalone","background_color":"#0b0f19","theme_color":"#30160b","icons":[{"src":"https://img.icons8.com/color/192/calendar--v1.png","sizes":"192x192","type":"image/png"}]}' />

  <!-- Laden der benötigten Bibliotheken über CDNs -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Verhindert unschöne Textauswahlen beim Klicken im Retro-Interface */
    .select-none {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body class="bg-gray-950">

  <!-- Root-Injektionspunkt für React -->
  <div id="root"></div>

  <!-- React-Anwendungstext mit Babel-In-Browser-Kompilierung -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Standard-Events auf Deutsch mit angepassten, thematischen Emojis (Kent mit Militär-Medaille statt Bombe)
    const DEFAULT_EVENTS = {
      Frühling: {
        4: { type: 'birthday', title: 'Kent', icon: '🎖️', color: '#ffeb3b', isDefault: true },
        13: { type: 'festival', title: 'Eierfestival', icon: '🥚', color: '#4caf50', isDefault: true },
        24: { type: 'festival', title: 'Blumentanz', icon: '🌸', color: '#e91e63', isDefault: true }
      },
      Sommer: {
        8: { type: 'birthday', title: 'Gus', icon: '🍳', color: '#ffeb3b', isDefault: true },
        11: { type: 'festival', title: 'Luau', icon: '🍲', color: '#ff9800', isDefault: true },
        28: { type: 'festival', title: 'Tanz der Leuchtquallen', icon: '🪼', color: '#3f51b5', isDefault: true }
      },
      Herbst: {
        16: { type: 'festival', title: 'Stardew-Valley-Messe', icon: '🎟️', color: '#9c27b0', isDefault: true },
        18: { type: 'birthday', title: 'Marnie', icon: '🥛', color: '#ffeb3b', isDefault: true },
        27: { type: 'festival', title: "Geisterabend", icon: '🎃', color: '#607d8b', isDefault: true }
      },
      Winter: {
        8: { type: 'festival', title: 'Eisfestival', icon: '⛄', color: '#00bcd4', isDefault: true },
        17: { type: 'birthday', title: 'Zauberer', icon: '🔮', color: '#ffeb3b', isDefault: true },
        25: { type: 'festival', title: 'Fest des Wintersterns', icon: '⭐', color: '#f44336', isDefault: true }
      }
    };

    const SEASONS = ['Frühling', 'Sommer', 'Herbst', 'Winter'];
    const DAYS_OF_WEEK = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];

    function App() {
      // Versuche gespeicherte Kalenderdaten aus dem LocalStorage zu laden, ansonsten Standard-Events nutzen
      const [calendarData, setCalendarData] = useState(() => {
        const savedData = localStorage.getItem('stardew_calendar_data');
        if (savedData) {
          try {
            return JSON.parse(savedData);
          } catch (e) {
            console.error("Fehler beim Laden der gespeicherten Kalenderdaten:", e);
          }
        }
        return DEFAULT_EVENTS;
      });

      const [currentSeason, setCurrentSeason] = useState('Frühling');
      const [selectedDay, setSelectedDay] = useState(1);
      const [toastMessage, setToastMessage] = useState('');
      const [isMuted, setIsMuted] = useState(false);
      
      // Formular-Zustände für den ausgewählten Tag
      const [eventType, setEventType] = useState('none');
      const [eventTitle, setEventTitle] = useState('');
      const [eventIcon, setEventIcon] = useState('⭐');
      const [eventColor, setEventColor] = useState('#4caf50');
      const [eventImage, setEventImage] = useState(null);

      const calendarRef = useRef(null);

      useEffect(() => {
        // VT323 Schriftart für perfekten Pixel-Look laden
        const link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=VT323&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);

        // html2canvas für den hochauflösenden PNG-Export laden
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        script.async = true;
        document.head.appendChild(script);

        return () => {
          document.head.removeChild(link);
          if (document.head.contains(script)) {
            document.head.removeChild(script);
          }
        };
      }, []);

      useEffect(() => {
        localStorage.setItem('stardew_calendar_data', JSON.stringify(calendarData));
      }, [calendarData]);

      useEffect(() => {
        const dayEvent = calendarData[currentSeason]?.[selectedDay];
        if (dayEvent) {
          setEventType(dayEvent.type);
          setEventTitle(dayEvent.title);
          setEventIcon(dayEvent.icon || '⭐');
          setEventColor(dayEvent.color || '#4caf50');
          setEventImage(dayEvent.image || null);
        } else {
          setEventType('none');
          setEventTitle('');
          setEventIcon('⭐');
          setEventColor('#4caf50');
          setEventImage(null);
        }
      }, [selectedDay, currentSeason]);

      const updateEventInCalendar = (changes) => {
        setCalendarData((prevData) => {
          const updatedData = { ...prevData };
          if (!updatedData[currentSeason]) {
            updatedData[currentSeason] = {};
          }

          const activeType = changes.type !== undefined ? changes.type : eventType;

          if (activeType === 'none') {
            delete updatedData[currentSeason][selectedDay];
          } else {
            // Ermittle die Werte, indem aktuelle State-Werte mit neuen Änderungen kombiniert werden
            const activeTitle = changes.title !== undefined ? changes.title : eventTitle;
            const activeIcon = changes.icon !== undefined ? changes.icon : eventIcon;
            const activeColor = changes.color !== undefined ? changes.color : eventColor;
            const activeImage = changes.image !== undefined ? changes.image : eventImage;

            updatedData[currentSeason][selectedDay] = {
              type: activeType,
              title: activeTitle || (activeType === 'birthday' ? 'Geburtstag' : 'Fest'),
              icon: activeIcon,
              color: activeColor,
              image: activeImage
            };
          }
          return updatedData;
        });
      };

      const playSound = (type) => {
        if (isMuted) return;
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          
          osc.connect(gain);
          gain.connect(ctx.destination);
          
          if (type === 'click') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
            osc.start();
            osc.stop(ctx.currentTime + 0.05);
          } else if (type === 'select') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(580, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(290, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
          } else if (type === 'save') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); // E5
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
          }
        } catch (e) {
          // Audio-Fehler geräuschlos abfangen
        }
      };

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 3000);
      };

      const handleDayClick = (day) => {
        playSound('click');
        setSelectedDay(day);
      };

      const handleSeasonChange = (season) => {
        playSound('select');
        setCurrentSeason(season);
        setSelectedDay(1);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setEventImage(reader.result);
            playSound('click');
            updateEventInCalendar({ image: reader.result });
          };
          reader.readAsDataURL(file);
        }
      };

      const handleSaveEvent = () => {
        playSound('save');
        showToast(`Tag ${selectedDay} erfolgreich gespeichert!`);
      };

      const handleExport = () => {
        if (!window.html2canvas) {
          showToast('Export-Modul lädt noch, bitte gleich noch einmal versuchen.');
          return;
        }

        playSound('save');
        const element = calendarRef.current;
        
        window.html2canvas(element, {
          backgroundColor: '#111827',
          scale: 2, // Hochauflösender Export für scharfe Pixelgrafiken
          useCORS: true
        }).then((canvas) => {
          const link = document.createElement('a');
          link.download = `stardew-kalender-${currentSeason.toLowerCase()}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          showToast('Kalenderbild erfolgreich heruntergeladen!');
        }).catch(() => {
          showToast('Export fehlgeschlagen. Versuche einen Screenshot zu machen.');
        });
      };

      const handleReset = () => {
        playSound('select');
        setCalendarData(JSON.parse(JSON.stringify(DEFAULT_EVENTS)));
        localStorage.removeItem('stardew_calendar_data');
        setSelectedDay(1);
        showToast('Kalender zurückgesetzt.');
      };

      return (
        <div className="min-h-screen bg-gray-950 text-[#431d11] font-mono p-4 md:p-8 flex flex-col items-center justify-start select-none" style={{ fontFamily: "'VT323', monospace" }}>
          
          {/* Toast Benachrichtigungssystem */}
          {toastMessage && (
            <div className="fixed top-6 z-50 bg-[#e4a558] border-4 border-[#431d11] text-[#431d11] px-6 py-3 text-2xl rounded shadow-2xl animate-bounce">
              {toastMessage}
            </div>
          )}

          {/* Hauptbereich */}
          <div className="w-full max-w-5xl">
            <header className="text-center mb-6 relative">
              <h1 className="text-5xl md:text-7xl text-amber-100 drop-shadow-[0_4px_0_rgba(0,0,0,0.85)] tracking-wider">
                Stardew Valley Kalender-Editor
              </h1>
              <p className="text-2xl text-amber-200 drop-shadow-[0_2px_0_rgba(0,0,0,0.8)] mt-2">
                Gestalte deinen eigenen, benutzerdefinierten 28-Tage-Kalender
              </p>

              {/* Sound-Schalter */}
              <button 
                onClick={() => { setIsMuted(!isMuted); playSound('click'); }} 
                className="absolute top-0 right-0 p-2 bg-[#30160b] hover:bg-[#4a2414] text-amber-100 rounded border-2 border-[#c18d53] text-xl cursor-pointer"
                title={isMuted ? "Töne einschalten" : "Stummschalten"}
              >
                {isMuted ? '🔇 Ton Aus' : '🔊 Ton An'}
              </button>
            </header>

            {/* Steuerungsleiste: Jahreszeiten & Aktionen */}
            <div className="flex flex-wrap items-center justify-between gap-4 mb-6 bg-[#30160b] p-3 rounded-lg border-4 border-[#c18d53]">
              
              {/* Jahreszeiten-Auswahl */}
              <div className="flex flex-wrap gap-2">
                {SEASONS.map((season) => {
                  const isActive = currentSeason === season;
                  const bgColors = {
                    Frühling: 'bg-[#9ccc65]',
                    Sommer: 'bg-[#ffd54f]',
                    Herbst: 'bg-[#ff8a65]',
                    Winter: 'bg-[#4fc3f7]'
                  };
                  const seasonIcons = {
                    Frühling: '🌱',
                    Sommer: '☀️',
                    Herbst: '🍂',
                    Winter: '❄️'
                  };
                  return (
                    <button
                      key={season}
                      onClick={() => handleSeasonChange(season)}
                      className={`px-4 py-1.5 text-2xl rounded border-2 border-[#431d11] cursor-pointer transition-all transform active:scale-95 flex items-center gap-2 ${
                        isActive 
                          ? `${bgColors[season]} text-[#431d11] font-bold shadow-md scale-105` 
                          : 'bg-[#f7e5c8] text-gray-700 hover:bg-[#e9d6b9]'
                      }`}
                    >
                      <span>{seasonIcons[season]}</span>
                      <span>{season}</span>
                    </button>
                  );
                })}
              </div>

              {/* Aktionsbuttons */}
              <div className="flex gap-2">
                <button 
                  onClick={handleExport}
                  className="px-4 py-1.5 bg-green-600 hover:bg-green-700 text-white rounded border-2 border-[#1a380f] text-2xl cursor-pointer transition-all transform active:scale-95"
                >
                  Bild Exportieren (PNG)
                </button>
                <button 
                  onClick={handleReset}
                  className="px-4 py-1.5 bg-[#d32f2f] hover:bg-red-800 text-amber-100 rounded border-2 border-black text-2xl cursor-pointer transition-all transform active:scale-95"
                >
                  Zurücksetzen
                </button>
              </div>
            </div>

            {/* Raster-Layout für Kalender und Editor */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* Kalenderanzeige (Links & Mitte) */}
              <div className="lg:col-span-2">
                <div 
                  ref={calendarRef}
                  className="p-4 md:p-6 bg-[#b1723c] rounded-xl border-8 border-[#5c2e16] shadow-2xl relative"
                >
                  {/* Dunkle innere Holzrahmen-Kante */}
                  <div className="absolute inset-0 border-4 border-[#3a1b0b] rounded-md pointer-events-none"></div>

                  {/* Kalendertitel Banner */}
                  <div className="bg-[#fcf1d8] border-4 border-[#431d11] rounded p-2 mb-4 text-center shadow-inner relative">
                    <span className="text-4xl md:text-5xl font-bold uppercase tracking-widest text-[#5c2e16]">
                      {currentSeason}
                    </span>
                    <div className="absolute top-1/2 left-6 -translate-y-1/2 text-2xl">🌾</div>
                    <div className="absolute top-1/2 right-6 -translate-y-1/2 text-2xl">🐔</div>
                  </div>

                  {/* Kalenderraster */}
                  <div className="bg-[#f7e5c8] border-4 border-[#431d11] rounded p-3 relative">
                    
                    {/* Wochentagsleiste */}
                    <div className="grid grid-cols-7 gap-1 text-center mb-2 border-b-4 border-[#431d11] pb-1">
                      {DAYS_OF_WEEK.map((day) => (
                        <div key={day} className="text-xl md:text-2xl font-bold text-[#8a4e28]">
                          {day}
                        </div>
                      ))}
                    </div>

                    {/* 28 Kalendertage */}
                    <div className="grid grid-cols-7 gap-2">
                      {Array.from({ length: 28 }, (_, index) => {
                        const day = index + 1;
                        const dayEvent = calendarData[currentSeason]?.[day];
                        const isSelected = selectedDay === day;

                        return (
                          <div
                            key={day}
                            onClick={() => handleDayClick(day)}
                            className={`aspect-square relative cursor-pointer rounded border-2 transition-all p-1 flex flex-col items-center justify-center overflow-hidden ${
                              isSelected 
                                ? 'border-yellow-500 bg-[#e7c793] ring-4 ring-yellow-400 scale-105 z-10' 
                                : 'border-[#431d11] bg-[#fcf1d8] hover:bg-[#ebd5b1]'
                            }`}
                          >
                            {/* Tagesnummer - Absolut positioniert um Platz zu sparen */}
                            <span className="absolute top-1 left-1.5 text-sm md:text-base font-bold text-[#8a4e28] leading-none z-10">
                              {day}
                            </span>

                            {/* Eventanzeige innerhalb der Zelle - Vertikal optimiert und höher gerückt */}
                            {dayEvent && (
                              <div className="w-full h-full flex flex-col items-center justify-center pt-4 md:pt-5 pb-0.5">
                                {dayEvent.type === 'birthday' && (
                                  <div className="relative flex flex-col items-center justify-center h-full w-full">
                                    {/* Portraitrahmen - Kompakter und höher gerückt */}
                                    <div className="w-7 h-7 sm:w-9 sm:h-9 md:w-11 md:h-11 rounded bg-[#dcb17a] border-2 border-[#431d11] flex items-center justify-center overflow-hidden shadow-sm shrink-0">
                                      {dayEvent.image ? (
                                        <img src={dayEvent.image} alt={dayEvent.title} className="w-full h-full object-cover animate-fade-in" />
                                      ) : (
                                        <span className="text-base sm:text-lg md:text-xl">{dayEvent.icon}</span>
                                      )}
                                    </div>
                                    {/* Text-Label perfekt am Boden platziert und voll sichtbar */}
                                    <span className="text-[7px] sm:text-[9px] md:text-[10px] font-bold text-center leading-none max-w-full truncate bg-[#431d11] text-amber-100 px-1 py-0.5 rounded-sm mt-0.5 shrink-0">
                                      {dayEvent.title}
                                    </span>
                                  </div>
                                )}

                                {dayEvent.type === 'festival' && (
                                  <div 
                                    className="w-full h-full rounded border border-[#431d11] flex flex-col items-center justify-center p-0.5 text-center text-white overflow-hidden"
                                    style={{ backgroundColor: dayEvent.color || '#4caf50' }}
                                  >
                                    <span className="text-xs sm:text-sm md:text-base leading-none mb-0.5">{dayEvent.icon}</span>
                                    <span className="text-[7px] sm:text-[9px] md:text-[10px] font-bold leading-none uppercase break-words line-clamp-2 w-full px-0.5">
                                      {dayEvent.title}
                                    </span>
                                  </div>
                                )}

                                {dayEvent.type === 'note' && (
                                  <div className="w-full h-full flex flex-col items-center justify-center text-center overflow-hidden">
                                    <span className="text-xs sm:text-sm md:text-base mb-0.5">{dayEvent.icon}</span>
                                    <span className="text-[7px] sm:text-[9px] md:text-[10px] text-[#5c2e16] font-semibold truncate w-full px-0.5">
                                      {dayEvent.title}
                                    </span>
                                  </div>
                                )}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>

                  </div>
                </div>
              </div>

              {/* Rechter Bereich: Editor-Zelle */}
              <div className="bg-[#b1723c] rounded-xl border-8 border-[#5c2e16] p-4 relative shadow-2xl h-fit">
                <div className="absolute inset-0 border-4 border-[#3a1b0b] rounded-md pointer-events-none"></div>
                
                <div className="bg-[#fcf1d8] border-4 border-[#431d11] rounded p-3 relative h-full">
                  <h2 className="text-3xl font-bold border-b-4 border-[#431d11] pb-2 text-center text-[#5c2e16]">
                    Tag {selectedDay} Bearbeiten
                  </h2>

                  <div className="space-y-4 mt-4 text-xl">
                    
                    {/* Event-Kategorie */}
                    <div>
                      <label className="block font-bold mb-1">Ereignis-Kategorie:</label>
                      <div className="grid grid-cols-2 gap-2">
                        {[
                          { id: 'none', label: 'Leer', icon: '❌' },
                          { id: 'birthday', label: 'Geburtstag', icon: '🎂' },
                          { id: 'festival', label: 'Fest', icon: '🎪' },
                          { id: 'note', label: 'Anderes', icon: '📌' }
                        ].map((opt) => (
                          <button
                            key={opt.id}
                            onClick={() => { 
                              playSound('click'); 
                              setEventType(opt.id);
                              updateEventInCalendar({ type: opt.id });
                            }}
                            className={`py-1.5 px-2 text-lg rounded border-2 border-[#431d11] cursor-pointer flex items-center justify-center gap-1 transition-all ${
                              eventType === opt.id 
                                ? 'bg-[#e4a558] font-bold shadow-inner border-yellow-700' 
                                : 'bg-[#f7e5c8] hover:bg-[#ebd5b1]'
                            }`}
                          >
                            <span>{opt.icon}</span>
                            <span>{opt.label}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Formular-Details bei aktivem Event */}
                    {eventType !== 'none' && (
                      <div className="space-y-4 animate-fade-in">
                        
                        {/* Titel / Name */}
                        <div>
                          <label className="block font-bold mb-1">Name / Beschreibung:</label>
                          <input
                            type="text"
                            value={eventTitle}
                            onChange={(e) => {
                              const val = e.target.value;
                              setEventTitle(val);
                              updateEventInCalendar({ title: val });
                            }}
                            placeholder={eventType === 'birthday' ? "Name des Dorfbewohners" : "Z.B. Festival-Name"}
                            className="w-full bg-[#f7e5c8] border-2 border-[#431d11] rounded p-2 text-[#431d11] placeholder-[#431d11]/40 outline-none focus:ring-2 focus:ring-[#8a4e28]"
                          />
                        </div>

                        {/* Standard Emoji-Auswahl */}
                        <div>
                          <label className="block font-bold mb-1">Symbol-Icon wählen:</label>
                          <div className="grid grid-cols-6 gap-1 bg-[#f7e5c8] p-2 border-2 border-[#431d11] rounded">
                            {['⭐', '🥚', '🌸', '🎂', '🎃', '🎁', '⛄', '🍲', '🏮', '🔮', '🎟️', '🦖', '🍎', '🐟', '🍺', '🐔', '🐮', '🧙'].map((emoji) => (
                              <button
                                key={emoji}
                                onClick={() => { 
                                  playSound('click'); 
                                  setEventIcon(emoji); 
                                  updateEventInCalendar({ icon: emoji });
                                }}
                                className={`text-2xl p-1 rounded hover:bg-[#ebd5b1] cursor-pointer ${
                                  eventIcon === emoji ? 'bg-[#c18d53] shadow-inner' : ''
                                }`}
                              >
                                {emoji}
                              </button>
                            ))}
                          </div>
                        </div>

                        {/* Geburtstag-Portrait Upload */}
                        {eventType === 'birthday' && (
                          <div className="border-t-2 border-[#431d11] pt-3">
                            <label className="block font-bold mb-1">Portrait hochladen (Optional):</label>
                            <div className="flex items-center gap-3">
                              <input 
                                type="file" 
                                accept="image/*" 
                                onChange={handleImageUpload} 
                                id="portrait-upload"
                                className="hidden"
                              />
                              <label 
                                htmlFor="portrait-upload"
                                className="bg-[#f7e5c8] hover:bg-[#ebd5b1] border-2 border-[#431d11] px-3 py-1.5 rounded cursor-pointer font-bold text-center flex-grow text-lg"
                              >
                                Datei auswählen
                              </label>
                              
                              {eventImage && (
                                <div className="relative w-12 h-12 border-2 border-[#431d11] rounded overflow-hidden shrink-0">
                                  <img src={eventImage} alt="Vorschau" className="w-full h-full object-cover" />
                                  <button 
                                    onClick={() => { 
                                      setEventImage(null); 
                                      playSound('click'); 
                                      updateEventInCalendar({ image: null });
                                    }}
                                    className="absolute top-0 right-0 bg-red-600 text-white w-4 h-4 flex items-center justify-center text-[10px] cursor-pointer font-bold"
                                  >
                                    X
                                  </button>
                                </div>
                              )}
                            </div>
                          </div>
                        )}

                        {/* Fest-Farbthemen */}
                        {eventType === 'festival' && (
                          <div className="border-t-2 border-[#431d11] pt-3">
                            <label className="block font-bold mb-1">Fest-Farbthema wählen:</label>
                            <div className="flex gap-2">
                              {[
                                { hex: '#4caf50', label: 'Frühlingsgrün' },
                                { hex: '#e91e63', label: 'Tanz-Rosa' },
                                { hex: '#ff9800', label: 'Sommer-Orange' },
                                { hex: '#3f51b5', label: 'Tiefblau' },
                                { hex: '#9c27b0', label: 'Messe-Lila' },
                                { hex: '#607d8b', label: 'Grusel-Grau' }
                              ].map((theme) => (
                                <button
                                  key={theme.hex}
                                  onClick={() => { 
                                    playSound('click'); 
                                    setEventColor(theme.hex); 
                                    updateEventInCalendar({ color: theme.hex });
                                  }}
                                  className={`w-8 h-8 rounded-full border-2 border-[#431d11] cursor-pointer transition-all relative ${
                                    eventColor === theme.hex ? 'scale-110 ring-2 ring-yellow-400' : ''
                                  }`}
                                  style={{ backgroundColor: theme.hex }}
                                  title={theme.label}
                                >
                                  {eventColor === theme.hex && (
                                    <span className="absolute inset-0 flex items-center justify-center text-xs text-white">✓</span>
                                  )}
                                </button>
                              ))}
                            </div>
                          </div>
                        )}

                      </div>
                    )}

                    {/* Speichern Feedback Button */}
                    <div className="border-t-4 border-[#431d11] pt-4 mt-6">
                      <button
                        onClick={handleSaveEvent}
                        className="w-full py-2 bg-[#9ccc65] hover:bg-[#8ebc59] border-2 border-[#431d11] font-bold text-2xl rounded text-[#1a380f] shadow cursor-pointer transition-all active:scale-95"
                      >
                        Änderungen übernehmen
                      </button>
                    </div>

                  </div>
                </div>
              </div>

            </div>

            {/* Info-Footer */}
            <footer className="mt-8 bg-[#30160b] p-4 rounded-lg border-4 border-[#c18d53] text-amber-100 text-lg md:text-xl flex flex-col md:flex-row justify-between items-center gap-4">
              <div>
                <p className="font-bold text-xl mb-1 text-amber-200">💡 Anleitung & Tipps:</p>
                <ul className="list-disc pl-5 space-y-1 text-amber-100/90 text-sm md:text-md">
                  <li>Deine Änderungen werden **sofort live gespeichert**, sobald du tippst oder Symbole änderst!</li>
                  <li>Klicke einfach auf einen beliebigen anderen Tag im Kalendergitter, um nahtlos weiterzuarbeiten.</li>
                  <li>Wechsle oben die Jahreszeiten, um das ganze Stardew-Jahr auszugestalten.</li>
                  <li>Lade ein quadratisches Pixel-Art-Portrait deines Lieblings-Dorfbewohners für Geburtstage hoch!</li>
                  <li>Mit dem "Bild Exportieren"-Button kannst du dein Design als scharfes Retro-Bild sichern.</li>
                </ul>
              </div>
              <div className="text-center md:text-right text-[#c18d53] text-sm shrink-0">
                Inspiriert vom Spieldesign aus Stardew Valley von ConcernedApe.
              </div>
            </footer>

          </div>
        </div>
      );
    }

    // React 18 Mounting-Prozedur
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    // PWA Service Worker Registrierung mit robustem Fallback
    if ('serviceWorker' in navigator && window.self === window.top) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => {
            console.log('PWA Service Worker registriert.');
          })
          .catch(err => {
            console.info('PWA-Modus: Offline-Synchronisierung läuft aktiv über LocalStorage.');
          });
      });
    } else {
      console.info('PWA-Modus: Service Worker im Iframe oder Sandbox übersprungen. Lokaler Speicher (LocalStorage) ist aktiv.');
    }
  </script>
</body>
</html>
