<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stardew Valley Kalender-Editor v1.5.7</title>
  
  <meta name="theme-color" content="#30160b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="shortcut icon" href="https://img.icons8.com/color/48/calendar--v1.png" type="image/png">
  <link rel="manifest" href='data:application/manifest+json,{"name":"Stardew Valley Kalender-Editor","short_name":"SV Kalender","start_url":".","display":"standalone","background_color":"#0b0f19","theme_color":"#30160b","icons":[{"src":"https://img.icons8.com/color/192/calendar--v1.png","sizes":"192x192","type":"image/png"}]}' />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .select-none {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body class="bg-gray-950">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DEFAULT_EVENTS = {
      Frühling: {
        4: { type: 'birthday', title: 'Kent', icon: '🎖️', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 },
        13: { type: 'festival', title: 'Eierfestival', icon: '🥚', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 },
        24: { type: 'festival', title: 'Blumentanz', icon: '🌸', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 }
      },
      Sommer: {
        8: { type: 'birthday', title: 'Gus', icon: '🍳', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 },
        11: { type: 'festival', title: 'Luau', icon: '🍲', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 },
        28: { type: 'festival', title: 'Tanz der Leuchtquallen', icon: '🪼', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 }
      },
      Herbst: {
        16: { type: 'festival', title: 'Stardew-Valley-Messe', icon: '🎟️', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 },
        18: { type: 'birthday', title: 'Marnie', icon: '🥛', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 },
        27: { type: 'festival', title: "Geisterabend", icon: '🎃', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 }
      },
      Winter: {
        8: { type: 'festival', title: 'Eisfestival', icon: '⛄', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 },
        17: { type: 'birthday', title: 'Zauberer', icon: '🔮', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 },
        25: { type: 'festival', title: 'Fest des Wintersterns', icon: '⭐', color: 'transparent', isDefault: true, rotation: 0, flip: false, scale: 1, offsetX: 0, offsetY: 0 }
      }
    };

    const SEASONS = ['Frühling', 'Sommer', 'Herbst', 'Winter'];
    const DAYS_OF_WEEK = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];

    function App() {
      const [calendarData, setCalendarData] = useState(() => {
        const params = new URLSearchParams(window.location.search);
        const seed = params.get('seed');
        if (seed) {
          try {
            return JSON.parse(decodeURIComponent(escape(atob(seed))));
          } catch (e) {
            console.error("Fehler beim Laden des Seeds:", e);
          }
        }
        
        const savedData = localStorage.getItem('stardew_calendar_data');
        if (savedData) {
          try {
            return JSON.parse(savedData);
          } catch (e) {
            console.error("Fehler beim Laden der gespeicherten Kalenderdaten:", e);
          }
        }
        return DEFAULT_EVENTS;
      });

      const [currentSeason, setCurrentSeason] = useState('Frühling');
      const [selectedDay, setSelectedDay] = useState(1);
      const [toastMessage, setToastMessage] = useState('');
      const [isMuted, setIsMuted] = useState(false);
      const [isEditorOpen, setIsEditorOpen] = useState(false);
      const [isModalOpen, setIsModalOpen] = useState(false); 
      const [isMenuOpen, setIsMenuOpen] = useState(false); // Neuer Status für das Untermenü
      
      const [eventType, setEventType] = useState('none');
      const [eventTitle, setEventTitle] = useState('');
      const [eventIcon, setEventIcon] = useState('⭐');
      const [eventColor, setEventColor] = useState('transparent');
      const [eventImage, setEventImage] = useState(null);
      const [eventRotation, setEventRotation] = useState(0);
      const [eventFlip, setEventFlip] = useState(false);
      const [eventScale, setEventScale] = useState(1);
      const [eventOffsetX, setEventOffsetX] = useState(0);
      const [eventOffsetY, setEventOffsetY] = useState(0);

      const [importData, setImportData] = useState('');

      const calendarRef = useRef(null);
      const menuRef = useRef(null);

      useEffect(() => {
        const link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=VT323&display=swap';
        link.rel = 'stylesheet';
        document.head.appendChild(link);

        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        script.async = true;
        document.head.appendChild(script);

        const handleClickOutside = (e) => {
           if (menuRef.current && !menuRef.current.contains(e.target)) {
               setIsMenuOpen(false);
           }
        };
        document.addEventListener('mousedown', handleClickOutside);

        return () => {
          document.head.removeChild(link);
          if (document.head.contains(script)) {
            document.head.removeChild(script);
          }
          document.removeEventListener('mousedown', handleClickOutside);
        };
      }, []);

      useEffect(() => {
        localStorage.setItem('stardew_calendar_data', JSON.stringify(calendarData));
      }, [calendarData]);

      // ... existing code ...
      // (Die restliche Logik bleibt unverändert erhalten, wie in v1.5.6)
      useEffect(() => {
        const dayEvent = calendarData[currentSeason]?.[selectedDay];
        if (dayEvent) {
          setEventType(dayEvent.type);
          setEventTitle(dayEvent.title);
          setEventIcon(dayEvent.icon || '⭐');
          setEventColor(dayEvent.color || 'transparent');
          setEventImage(dayEvent.image || null);
          setEventRotation(dayEvent.rotation || 0);
          setEventFlip(dayEvent.flip || false);
          setEventScale(dayEvent.scale || 1);
          setEventOffsetX(dayEvent.offsetX || 0);
          setEventOffsetY(dayEvent.offsetY || 0);
        } else {
          setEventType('none');
          setEventTitle('');
          setEventIcon('⭐');
          setEventColor('transparent');
          setEventImage(null);
          setEventRotation(0);
          setEventFlip(false);
          setEventScale(1);
          setEventOffsetX(0);
          setEventOffsetY(0);
        }
      }, [selectedDay, currentSeason]);

      const updateEventInCalendar = (changes) => {
        setCalendarData((prevData) => {
          const updatedData = { ...prevData };
          if (!updatedData[currentSeason]) {
            updatedData[currentSeason] = {};
          }

          const activeType = changes.type !== undefined ? changes.type : eventType;

          if (activeType === 'none') {
            delete updatedData[currentSeason][selectedDay];
          } else {
            const activeTitle = changes.title !== undefined ? changes.title : eventTitle;
            const activeIcon = changes.icon !== undefined ? changes.icon : eventIcon;
            const activeColor = changes.color !== undefined ? changes.color : eventColor;
            const activeImage = changes.image !== undefined ? changes.image : eventImage;
            const activeRotation = changes.rotation !== undefined ? changes.rotation : eventRotation;
            const activeFlip = changes.flip !== undefined ? changes.flip : eventFlip;
            const activeScale = changes.scale !== undefined ? changes.scale : eventScale;
            const activeOffsetX = changes.offsetX !== undefined ? changes.offsetX : eventOffsetX;
            const activeOffsetY = changes.offsetY !== undefined ? changes.offsetY : eventOffsetY;

            updatedData[currentSeason][selectedDay] = {
              type: activeType,
              title: activeTitle || (activeType === 'birthday' ? 'Geburtstag' : 'Fest'),
              icon: activeIcon,
              color: activeColor,
              image: activeImage,
              rotation: activeRotation,
              flip: activeFlip,
              scale: activeScale,
              offsetX: activeOffsetX,
              offsetY: activeOffsetY
            };
          }
          return updatedData;
        });
      };

      const playSound = (type) => {
        if (isMuted) return;
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          
          osc.connect(gain);
          gain.connect(ctx.destination);
          
          if (type === 'click') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
            osc.start();
            osc.stop(ctx.currentTime + 0.05);
          } else if (type === 'select') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(580, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(290, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
          } else if (type === 'save') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(523.25, ctx.currentTime);
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
            osc.start();
            osc.stop(ctx.currentTime + 0.22);
          }
        } catch (e) {}
      };

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 3000);
      };

      const handleDayClick = (day) => {
        playSound('click');
        setSelectedDay(day);
        setIsEditorOpen(true);
      };

      const handleSeasonChange = (season) => {
        playSound('select');
        setCurrentSeason(season);
        setSelectedDay(1);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setEventImage(reader.result);
            playSound('click');
            updateEventInCalendar({ image: reader.result });
          };
          reader.readAsDataURL(file);
        }
      };

      const handleSaveEvent = () => {
        playSound('save');
        setIsEditorOpen(false);
        showToast(`Tag ${selectedDay} gespeichert!`);
      };

      const handleExport = () => {
        if (!window.html2canvas) {
          showToast('Export-Modul lädt noch...');
          return;
        }

        playSound('save');
        window.scrollTo(0,0);
        const element = calendarRef.current;
        
        setTimeout(() => {
          window.html2canvas(element, {
            backgroundColor: '#b1723c',
            scale: 2, 
            useCORS: true
          }).then((canvas) => {
            const link = document.createElement('a');
            link.download = `stardew-kalender-${currentSeason.toLowerCase()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('Kalender als Bild gespeichert!');
          }).catch(() => {
            showToast('Export fehlgeschlagen.');
          });
        }, 100);
      };

      const handleReset = () => {
        playSound('select');
        setCalendarData(JSON.parse(JSON.stringify(DEFAULT_EVENTS)));
        localStorage.removeItem('stardew_calendar_data');
        setSelectedDay(1);
        showToast('Kalender zurückgesetzt.');
      };

      const handleDownloadJSON = () => {
        const blob = new Blob([JSON.stringify(calendarData)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'stardew-kalender-config.json';
        a.click();
        showToast('JSON exportiert!');
      };

      const handleCopyJSON = () => {
        navigator.clipboard.writeText(JSON.stringify(calendarData));
        showToast('JSON in Zwischenablage kopiert!');
      };

      const handleCopyShare = () => {
        const seed = btoa(unescape(encodeURIComponent(JSON.stringify(calendarData))));
        const shareUrl = window.location.origin + window.location.pathname + '?seed=' + seed;
        navigator.clipboard.writeText(shareUrl).then(() => showToast('Link kopiert!'));
      };

      const handleImportJSON = () => {
        try {
          const parsed = JSON.parse(importData);
          setCalendarData(parsed);
          setIsModalOpen(false);
          showToast('Daten importiert!');
        } catch (e) {
          showToast('Fehler bei JSON-Datei!');
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            setImportData(ev.target.result);
          };
          reader.readAsText(file);
        }
      };

      return (
        <div className="min-h-screen bg-gray-950 text-[#431d11] font-mono p-4 md:p-8 flex flex-col items-center justify-start select-none" style={{ fontFamily: "'VT323', monospace" }}>
          
          {toastMessage && (
            <div className="fixed top-6 z-50 bg-[#e4a558] border-4 border-[#431d11] text-[#431d11] px-6 py-3 text-2xl rounded shadow-2xl animate-bounce">
              {toastMessage}
            </div>
          )}

          {isModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
              <div className="bg-[#b1723c] p-6 rounded-xl border-8 border-[#5c2e16] w-full max-w-lg shadow-2xl">
                 <h2 className="text-3xl font-bold mb-4 text-[#fcf1d8]">Import / Export / Teilen</h2>
                 <div className="space-y-4 bg-[#fcf1d8] p-4 rounded border-2 border-[#431d11]">
                    <button onClick={handleDownloadJSON} className="w-full bg-[#9ccc65] p-2 rounded border-2 border-[#431d11] font-bold">JSON Datei Exportieren</button>
                    <button onClick={handleCopyJSON} className="w-full bg-[#9ccc65] p-2 rounded border-2 border-[#431d11] font-bold">JSON in Zwischenablage kopieren</button>
                    <button onClick={handleCopyShare} className="w-full bg-[#e4a558] p-2 rounded border-2 border-[#431d11] font-bold">Link zum Teilen kopieren</button>
                    <hr className="border-[#431d11]" />
                    <textarea value={importData} onChange={(e) => setImportData(e.target.value)} className="w-full h-32 bg-[#f7e5c8] border-2 border-[#431d11] p-2" placeholder="Hier JSON einfügen..."></textarea>
                    <input type="file" onChange={handleFileUpload} className="w-full text-lg" />
                    <button onClick={handleImportJSON} className="w-full bg-blue-500 text-white p-2 rounded border-2 border-[#431d11] font-bold">Daten importieren</button>
                 </div>
                 <button onClick={() => setIsModalOpen(false)} className="mt-4 w-full bg-red-600 text-white p-2 rounded font-bold">Schließen</button>
              </div>
            </div>
          )}

          {/* Editor-Komponente bleibt gleich */}
          {isEditorOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
              <div className="relative w-full max-w-lg bg-[#b1723c] rounded-xl border-8 border-[#5c2e16] shadow-2xl flex flex-col max-h-[90vh]">
                <div className="relative p-3 text-center border-b-4 border-[#5c2e16] bg-[#b1723c]">
                  <button onClick={() => { playSound('save'); setIsEditorOpen(false); }} className="absolute top-2 right-2 text-3xl font-bold bg-[#5c2e16] text-amber-100 px-3 py-1 rounded hover:bg-[#3a1b0b]">X</button>
                  <h2 className="text-3xl font-bold text-[#fcf1d8]">Tag {selectedDay} Bearbeiten</h2>
                </div>
                {/* ... existing code ... */}
                <div className="bg-[#fcf1d8] border-b-4 border-[#431d11] p-3 flex justify-center items-center">
                  <div className="w-24 h-24 bg-[#fcf1d8] border-4 border-[#431d11] rounded relative flex items-center justify-center shadow-inner">
                    <span className="absolute top-1 left-2 text-xl font-bold text-[#8a4e28]">{selectedDay}</span>
                    <div className="w-full h-full flex flex-col items-center justify-center pt-2 transform -translate-x-3 translate-y-1">
                      <div 
                        className={`w-full h-full rounded flex flex-col items-center justify-center p-0.5 text-center overflow-hidden transition-all ${(!eventColor || eventColor === 'transparent') ? '' : 'border border-[#431d11]'}`}
                        style={{ 
                          backgroundColor: eventColor || 'transparent',
                          transform: `rotate(${eventRotation}deg) scaleX(${eventFlip ? -1 : 1}) scale(${eventScale}) translate(${eventOffsetX}px, ${eventOffsetY}px)`
                        }}
                      >
                         {eventType !== 'none' && eventImage ? <img src={eventImage} className="w-full h-full object-cover" /> : <span className="text-xl">{eventIcon}</span>}
                      </div>
                    </div>
                  </div>
                </div>
                <div className="overflow-y-auto flex-grow p-4 bg-[#fcf1d8]">
                  <div className="space-y-4 text-xl">
                    <div>
                      <label className="block font-bold mb-1">Ereignis-Kategorie:</label>
                      <div className="grid grid-cols-2 gap-2">
                        {[{ id: 'none', label: 'Leer', icon: '❌' }, { id: 'birthday', label: 'Geburtstag', icon: '🎂' }, { id: 'festival', label: 'Fest', icon: '🎪' }, { id: 'note', label: 'Anderes', icon: '📌' }].map((opt) => (
                          <button key={opt.id} onClick={() => { playSound('click'); setEventType(opt.id); updateEventInCalendar({ type: opt.id }); }} className={`py-1.5 px-2 text-lg rounded border-2 border-[#431d11] cursor-pointer flex items-center justify-center gap-1 transition-all ${eventType === opt.id ? 'bg-[#e4a558] font-bold shadow-inner border-yellow-700' : 'bg-[#f7e5c8] hover:bg-[#ebd5b1]'}`}><span>{opt.icon}</span><span>{opt.label}</span></button>
                        ))}
                      </div>
                    </div>
                    {eventType !== 'none' && (
                      <div className="space-y-4 animate-fade-in">
                        <div>
                          <label className="block font-bold mb-1">Name / Beschreibung:</label>
                          <input type="text" value={eventTitle} onChange={(e) => { const val = e.target.value; setEventTitle(val); updateEventInCalendar({ title: val }); }} placeholder={eventType === 'birthday' ? "Name des Dorfbewohners" : "Z.B. Festival-Name"} className="w-full bg-[#f7e5c8] border-2 border-[#431d11] rounded p-2 text-[#431d11] placeholder-[#431d11]/40 outline-none focus:ring-2 focus:ring-[#8a4e28]" />
                        </div>
                        <div>
                          <label className="block font-bold mb-1">Symbol-Icon wählen:</label>
                          <div className="grid grid-cols-6 gap-1 bg-[#f7e5c8] p-2 border-2 border-[#431d11] rounded">
                            {['⭐', '🥚', '🌸', '🎂', '🎃', '🎁', '⛄', '🍲', '🏮', '🔮', '🎟️', '🦖', '🍎', '🐟', '🍺', '🐔', '🐮', '🧙'].map((emoji) => (
                              <button key={emoji} onClick={() => { playSound('click'); setEventIcon(emoji); updateEventInCalendar({ icon: emoji }); }} className={`text-2xl p-1 rounded hover:bg-[#ebd5b1] cursor-pointer ${eventIcon === emoji ? 'bg-[#c18d53] shadow-inner' : ''}`}>{emoji}</button>
                            ))}
                          </div>
                        </div>
                        <div className="border-t-2 border-[#431d11] pt-3 space-y-3">
                          <label className="block font-bold mb-1">Transformation:</label>
                          <div className="flex gap-2 items-center">
                            <button onClick={() => { const newRot = (eventRotation + 90) % 360; setEventRotation(newRot); updateEventInCalendar({ rotation: newRot }); playSound('click'); }} className="px-3 py-1.5 bg-[#f7e5c8] border-2 border-[#431d11] rounded cursor-pointer hover:bg-[#ebd5b1]">↺ Rotieren</button>
                            <button onClick={() => { const newFlip = !eventFlip; setEventFlip(newFlip); updateEventInCalendar({ flip: newFlip }); playSound('click'); }} className={`px-3 py-1.5 border-2 border-[#431d11] rounded cursor-pointer ${eventFlip ? 'bg-[#c18d53]' : 'bg-[#f7e5c8]'} hover:bg-[#ebd5b1]`}>↔ Spiegeln</button>
                          </div>
                          <div className="space-y-1">
                            <label className="text-base font-bold">Größe: {Math.round(eventScale * 100)}%</label>
                            <input type="range" min="0.5" max="2" step="0.1" value={eventScale} onChange={(e) => { const s = parseFloat(e.target.value); setEventScale(s); updateEventInCalendar({ scale: s }); }} className="w-full accent-[#431d11]" />
                          </div>
                          <div className="space-y-1">
                            <label className="text-base font-bold">Verschiebung X: {eventOffsetX}px</label>
                            <input type="range" min="-40" max="40" step="1" value={eventOffsetX} onChange={(e) => { const x = parseInt(e.target.value); setEventOffsetX(x); updateEventInCalendar({ offsetX: x }); }} className="w-full accent-[#431d11]" />
                          </div>
                          <div className="space-y-1">
                            <label className="text-base font-bold">Verschiebung Y: {eventOffsetY}px</label>
                            <input type="range" min="-40" max="40" step="1" value={eventOffsetY} onChange={(e) => { const y = parseInt(e.target.value); setEventOffsetY(y); updateEventInCalendar({ offsetY: y }); }} className="w-full accent-[#431d11]" />
                          </div>
                        </div>
                        <div className="border-t-2 border-[#431d11] pt-3">
                            <label className="block font-bold mb-1">Bild/Portrait (Optional):</label>
                            <div className="flex items-center gap-3">
                              <input type="file" accept="image/*" onChange={handleImageUpload} id="portrait-upload" className="hidden" />
                              <label htmlFor="portrait-upload" className="bg-[#f7e5c8] hover:bg-[#ebd5b1] border-2 border-[#431d11] px-3 py-1.5 rounded cursor-pointer font-bold text-center flex-grow text-lg">Datei auswählen</label>
                            </div>
                        </div>
                      </div>
                    )}
                    <div className="border-t-4 border-[#431d11] pt-4 mt-6">
                      <button onClick={handleSaveEvent} className="w-full py-2 bg-[#9ccc65] hover:bg-[#8ebc59] border-2 border-[#431d11] font-bold text-2xl rounded text-[#1a380f] shadow cursor-pointer transition-all active:scale-95">Änderungen übernehmen</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="w-full max-w-5xl">
            <header className="text-center mb-6 relative">
              <h1 className="text-5xl md:text-7xl text-amber-100 drop-shadow-[0_4px_0_rgba(0,0,0,0.85)] tracking-wider">
                Stardew Valley Kalender-Editor
              </h1>
              <p className="text-2xl text-amber-200 drop-shadow-[0_2px_0_rgba(0,0,0,0.8)] mt-2">
                Gestalte deinen eigenen, benutzerdefinierten 28-Tage-Kalender
              </p>

              <button 
                onClick={() => { setIsMuted(!isMuted); playSound('click'); }} 
                className="absolute top-0 right-0 p-2 bg-[#30160b] hover:bg-[#4a2414] text-amber-100 rounded border-2 border-[#c18d53] text-xl cursor-pointer"
                title={isMuted ? "Töne einschalten" : "Stummschalten"}
              >
                {isMuted ? '🔇 Ton Aus' : '🔊 Ton An'}
              </button>
            </header>

            <div className="flex flex-wrap items-center justify-between gap-4 mb-6 bg-[#30160b] p-3 rounded-lg border-4 border-[#c18d53]">
              <div className="flex flex-wrap gap-2">
                {SEASONS.map((season) => {
                  const isActive = currentSeason === season;
                  const bgColors = { Frühling: 'bg-[#9ccc65]', Sommer: 'bg-[#ffd54f]', Herbst: 'bg-[#ff8a65]', Winter: 'bg-[#4fc3f7]' };
                  const seasonIcons = { Frühling: '🌱', Sommer: '☀️', Herbst: '🍂', Winter: '❄️' };
                  return (
                    <button
                      key={season}
                      onClick={() => handleSeasonChange(season)}
                      className={`px-4 py-1.5 text-2xl rounded border-2 border-[#431d11] cursor-pointer transition-all transform active:scale-95 flex items-center gap-2 ${
                        isActive ? `${bgColors[season]} text-[#431d11] font-bold shadow-md scale-105` : 'bg-[#f7e5c8] text-gray-700 hover:bg-[#e9d6b9]'
                      }`}
                    >
                      <span>{seasonIcons[season]}</span>
                      <span>{season}</span>
                    </button>
                  );
                })}
              </div>
              
              {/* Untermenü Button */}
              <div className="relative" ref={menuRef}>
                  <button onClick={() => { playSound('click'); setIsMenuOpen(!isMenuOpen); }} className="px-4 py-1.5 bg-[#5c2e16] hover:bg-[#431d11] text-amber-100 rounded border-2 border-[#c18d53] text-2xl cursor-pointer transition-all active:scale-95">⚙️ Menü</button>
                  
                  {isMenuOpen && (
                    <div className="absolute right-0 top-12 w-64 bg-[#b1723c] border-4 border-[#5c2e16] p-2 rounded-xl shadow-2xl z-40 flex flex-col gap-2 animate-in fade-in zoom-in duration-200">
                        <button onClick={() => { setIsModalOpen(true); setIsMenuOpen(false); }} className="w-full text-left px-3 py-2 bg-[#e4a558] hover:bg-[#c18d53] text-[#431d11] rounded border-2 border-[#431d11] text-xl font-bold cursor-pointer">Import/Export</button>
                        <button onClick={() => { handleExport(); setIsMenuOpen(false); }} className="w-full text-left px-3 py-2 bg-green-600 hover:bg-green-700 text-white rounded border-2 border-[#1a380f] text-xl font-bold cursor-pointer">Bild Exportieren (PNG)</button>
                        <button onClick={() => { handleReset(); setIsMenuOpen(false); }} className="w-full text-left px-3 py-2 bg-[#d32f2f] hover:bg-red-800 text-amber-100 rounded border-2 border-black text-xl font-bold cursor-pointer">Zurücksetzen</button>
                    </div>
                  )}
              </div>
            </div>

            <div className="grid grid-cols-1 gap-6">
              <div className="w-full">
                <div ref={calendarRef} className="p-4 md:p-6 bg-[#b1723c] rounded-xl border-8 border-[#5c2e16] shadow-2xl relative">
                  <div className="absolute -top-6 left-1/2 -translate-x-1/2 z-20">
                    <div className="w-6 h-6 bg-gray-500 rounded-full border-2 border-gray-700 shadow-[0_2px_4px_rgba(0,0,0,0.5)]"></div>
                  </div>
                  
                  <div className="absolute inset-0 border-4 border-[#3a1b0b] rounded-md pointer-events-none"></div>
                  
                  <div className="bg-[#fcf1d8] border-4 border-[#431d11] rounded p-2 mb-4 text-center shadow-inner relative">
                    <span className="text-4xl md:text-5xl font-bold uppercase tracking-widest text-[#5c2e16]">{currentSeason}</span>
                  </div>
                  
                  <div className="bg-[#f7e5c8] border-4 border-[#431d11] rounded p-3 relative">
                    <div className="grid grid-cols-7 gap-1 text-center mb-2 border-b-4 border-[#431d11] pb-1">
                      {DAYS_OF_WEEK.map((day) => <div key={day} className="text-xl md:text-2xl font-bold text-[#8a4e28]">{day}</div>)}
                    </div>
                    <div className="grid grid-cols-7 gap-2">
                      {Array.from({ length: 28 }, (_, index) => {
                        const day = index + 1;
                        const dayEvent = calendarData[currentSeason]?.[day];
                        const isSelected = selectedDay === day;
                        return (
                          <div key={day} onClick={() => handleDayClick(day)} className={`aspect-square relative cursor-pointer rounded border-2 transition-all p-1 flex flex-col items-center justify-center overflow-hidden ${isSelected ? 'border-yellow-500 bg-[#e7c793] ring-4 ring-yellow-400 scale-105 z-10' : 'border-[#431d11] bg-[#fcf1d8] hover:bg-[#ebd5b1]'}`}>
                            <span className="absolute top-1 left-1.5 text-2xl md:text-3xl font-bold text-[#8a4e28] leading-none z-10">{day}</span>
                            {dayEvent && (
                              <div className="w-full h-full flex flex-col items-center justify-center pt-2 transform -translate-x-3 translate-y-1">
                                <div 
                                  className={`w-full h-full rounded flex flex-col items-center justify-center p-0.5 text-center overflow-hidden transition-all ${(!dayEvent.color || dayEvent.color === 'transparent') ? '' : 'border border-[#431d11]'}`}
                                  style={{ 
                                    backgroundColor: dayEvent.color || 'transparent',
                                    transform: `rotate(${dayEvent.rotation || 0}deg) scaleX(${dayEvent.flip ? -1 : 1}) scale(${dayEvent.scale || 1}) translate(${dayEvent.offsetX || 0}px, ${dayEvent.offsetY || 0}px)`
                                  }}
                                  title={dayEvent.title}
                                >
                                  {dayEvent.type !== 'none' && dayEvent.image ? (
                                    <div className="w-full h-full rounded flex items-center justify-center overflow-hidden shadow-sm shrink-0">
                                      <img src={dayEvent.image} alt={dayEvent.title} className="w-full h-full object-cover" />
                                    </div>
                                  ) : (
                                    <span className="text-sm sm:text-base md:text-xl leading-none drop-shadow-[0_1px_0_rgba(0,0,0,0.15)]">{dayEvent.icon || '⭐'}</span>
                                  )}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <footer className="mt-8 bg-[#30160b] p-4 rounded-lg border-4 border-[#c18d53] text-amber-100 text-lg md:text-xl flex flex-col md:flex-row justify-between items-center gap-4">
              <div>
                <p className="font-bold text-xl mb-1 text-amber-200">💡 Anleitung & Tipps:</p>
                <ul className="list-disc pl-5 space-y-1 text-amber-100/90 text-sm md:text-md">
                  <li>Klicke auf einen Tag, um den **Editor als Fenster** zu öffnen.</li>
                  <li>Deine Änderungen werden **sofort live gespeichert**.</li>
                  <li>Nutze den "Menü" Button zum Exportieren oder Teilen.</li>
                </ul>
              </div>
              <div className="text-center md:text-right text-[#c18d53] text-sm shrink-0">Inspiriert vom Spieldesign aus Stardew Valley von ConcernedApe.</div>
            </footer>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    if ('serviceWorker' in navigator && window.self === window.top) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(() => { console.log('PWA Service Worker registriert.'); }).catch(err => { console.info('PWA-Modus: Offline-Synchronisierung läuft aktiv über LocalStorage.'); });
      });
    } else {
      console.info('PWA-Modus: Service Worker im Iframe oder Sandbox übersprungen. Lokaler Speicher (LocalStorage) ist aktiv.');
    }
  </script>
</body>
</html>
